
#############################################################
## Collective Variables                                    ##
#############################################################
colvar {
  name dist1
  distance {
    group1 { 
      psfSegID PROA
      atomNameResidueRange { CA 12-37 }
}
    group2 {
      psfSegID PROB
      atomNameResidueRange { CA 12-37 }
}
  }
}

harmonic {
  colvars { dist1}
  forceConstant 20.0
  centers { 9.73}        # initial distance
  targetCenters {8}  # final distance
  targetNumSteps 250000
}


colvar {
   name helix1
   tilt {
       atoms {
          psfsegID PROA
          atomNameResidueRange { CA 12-37 }          
       }
       refPositionsFile      PROA.ref
       refPositionsCol       B
       refPositionsColValue  1.0
   }
}

harmonic {
   colvars helix1
   axis 6
   centers 0   
   forceConstant 0.1
}

colvar {
   name helix2
   tilt {
       atoms {
          psfsegID PROB
          atomNameResidueRange { CA 12-37 }
       }
       refPositionsFile      PROB.ref
       refPositionsCol       B
       refPositionsColValue  1.0
   }
}

harmonic {
   colvars helix2
   axis 6
   centers 0
   forceConstant 0.1
}
